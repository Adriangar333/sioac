databases:
  - name: sioac-db
    plan: free
    databaseName: sioac
    user: sioac_user

services:
  - type: web
    name: sioac
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sioac-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SERPER_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: GOOGLE_CLOUD_NL_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
